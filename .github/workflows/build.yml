name: Build KernelSU Next Clean Step

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libncurses-dev bison flex bc libelf-dev gcc-aarch64-linux-gnu dos2unix git clang llvm lld

      - name: Download and Inject KernelSU Next Directly
        run: |
          rm -rf drivers/kernelsu
          
          # جلب المستودع النظيف
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next.git temp_ksu
          mkdir -p drivers/kernelsu
          cp -r temp_ksu/kernel/* drivers/kernelsu/
          rm -rf temp_ksu

          # ربط المجلد داخل شجرة النواة
          if [ -f "drivers/Makefile" ]; then
            if ! grep -q "kernelsu" drivers/Makefile; then
              echo "obj-y += kernelsu/" >> drivers/Makefile
            fi
          fi
          
          if [ -f "drivers/Kconfig" ]; then
            if ! grep -q "kernelsu" drivers/Kconfig; then
              sed -i '/endmenu/i \\tsource "drivers/kernelsu/Kconfig"' drivers/Kconfig
            fi
          fi

          # ترقيع ملف fs/exec.c في المكان الصحيح تماماً (قبل دالة البحث عن المشغلات الثنائية)
          if [ -f "fs/exec.c" ]; then
            # استعادة الملف الأصلي النظيف للتخلص من أي حقن خاطئ سابق
            git checkout fs/exec.c
            
            # الحقن الذكي قبل السطر الشهير search_binary_handler
            sed -i '/search_binary_handler(bprm);/i \    { extern int ksu_handle_execve(struct linux_binprm **bprm); ksu_handle_execve(&bprm); }' fs/exec.c
          fi

          # ترقيع ملف fs/open.c
          if [ -f "fs/open.c" ]; then
            git checkout fs/open.c
            sed -i '/return vfs_open(path, f, current_cred());/i \    { extern int ksu_handle_vfs_open(struct path *path, int *flags, const struct cred *cred); ksu_handle_vfs_open(path, &f->f_mode, current_cred()); }' fs/open.c
          fi

      - name: Start Kernel Build
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export KCFLAGS="-w -fno-strict-aliasing -Wno-implicit-function-declaration -Wno-attribute-alias -Wno-error=attributes -fno-inline-functions -DCONFIG_KSU" 
          
          make ARCH=arm64 a06_defconfig

          # تفعيل الإعدادات
          echo "CONFIG_KPROBES=y" >> .config
          echo "CONFIG_HAVE_KPROBES=y" >> .config
          echo "CONFIG_BLK_DEV_INITRD=y" >> .config
          echo "CONFIG_KSU=y" >> .config
          echo "CONFIG_KSU_NEXT=y" >> .config
          echo "CONFIG_STRICT_KERNEL_RWX=n" >> .config
          echo "CONFIG_MODULE_SIG=n" >> .config
          
          make ARCH=arm64 -j$(nproc)

      - name: Upload Output Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Boot_Image
          path: arch/arm64/boot/Image*
